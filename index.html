<!DOCTYPE html>
<html>
<head>
<title>FilmHall Booking</title>

<style>
body{
font-family:Arial;
text-align:center;
background:#111;
color:white
}
.logo{
width:120px;
margin-top:20px;
}
.poster{
width:260px;
border-radius:10px;
margin-top:20px
}

button{
padding:15px 30px;
font-size:20px;
background:red;
color:white;
border:none;
border-radius:6px;
margin-top:20px
}

</style>
</head>

<body>
<img src="logo.jpg" class="logo">

<h1>FILMHALL</h1>

<img src="poster.jpg" class="poster">

<h2>Movie : BARABADHU</h2>

<p>Total Seats : 100</p>

<p>Remaining Seats : <b id="remain">Loading...</b></p>

<button onclick="pay()">Pay ₹100 Ticket</button>
<h2 id="housefull" style="color:red;display:none;">HOUSEFULL</h2>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCXSoJ951nIgHvyQVwfBALCL4r2qRxoS8g",
  authDomain: "filmhall-ticket.firebaseapp.com",
  projectId: "filmhall-ticket",
  storageBucket: "filmhall-ticket.firebasestorage.app",
  messagingSenderId: "856241264632",
  appId: "1:856241264632:web:986c80f2f7970d99f8e80d",
  measurementId: "G-LKBSVCM00Y"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const ref = doc(db,"filmhall","counter");

async function loadSeats(){

  const snap = await getDoc(ref);

  let sold = snap.data().sold;

  let remain = 100 - sold;

  document.getElementById("remain").innerText = remain;

  if(remain <= 0){

    document.getElementById("payBtn").style.display="none";

    document.getElementById("housefull").style.display="block";

  }

}

loadSeats();

window.pay = function(){

  window.open("upi://pay?pa=7326097670@ybl&pn=FilmHall&am=100");

  setTimeout(()=>{

    window.location.href="ticket.html";

  },4000);

}
