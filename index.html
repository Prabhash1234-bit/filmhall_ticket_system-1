<!DOCTYPE html>
<html>
<head>
<title>FilmHall Ticket</title>

<style>
body{
font-family:Arial;
text-align:center;
background:#111;
color:white
}

.logo{
width:120px;
margin-top:10px
}

.poster{
width:250px;
border-radius:10px
}

button{
padding:14px 30px;
font-size:18px;
background:red;
color:white;
border:none;
border-radius:6px;
margin-top:20px
}

</style>
</head>

<body>

<img src="logo.jpg" class="logo">

<h1>FILMHALL</h1>

<img src="poster.jpg" class="poster">

<h2>Movie : BARABADHU</h2>

<p>Total Seats : 100</p>

<p>Remaining Seats : <b id="remain">Loading...</b></p>

<button onclick="buyTicket()">Pay ₹100 For Ticket</button>


<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCXSoJ951nIgHvyQVwfBALCL4r2qRxoS8g",
  authDomain: "filmhall-ticket.firebaseapp.com",
  projectId: "filmhall-ticket",
  storageBucket: "filmhall-ticket.firebasestorage.app",
  messagingSenderId: "856241264632",
  appId: "1:856241264632:web:986c80f2f7970d99f8e80d",
  measurementId: "G-LKBSVCM00Y"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const docRef = doc(db,"shows","today");

async function loadSeats(){

const snap = await getDoc(docRef);

if(snap.exists()){

let booked = snap.data().booked;
let remain = 100 - booked;

document.getElementById("remain").innerText = remain;

}

}

loadSeats();


async function buyTicket(){

const snap = await getDoc(docRef);

let booked = snap.data().booked;

if(booked >= 100){

alert("HOUSEFULL");

return;

}

let ticketNumber = booked + 1;

await updateDoc(docRef,{
booked:ticketNumber
});

window.location.href="ticket.html?ticket="+ticketNumber;

}

</script>

</body>
</html>
