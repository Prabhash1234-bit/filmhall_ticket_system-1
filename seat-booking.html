<!DOCTYPE html>
<html>
<head>
<title>Select Seat</title>

<style>
body{font-family:Arial;text-align:center}
.seat{
width:40px;
height:40px;
margin:5px;
background:green;
display:inline-block;
cursor:pointer;
color:white;
line-height:40px;
}

.selected{background:red}
</style>
</head>

<body>

<h2>Select Your Seat</h2>

<div id="seats"></div>

<br>

<button onclick="pay()">Pay ₹100</button>

<script>

let selectedSeat=null

for(let i=1;i<=100;i++){

let seat=document.createElement("div")
seat.className="seat"
seat.innerText=i

seat.onclick=function(){

document.querySelectorAll(".seat")
.forEach(s=>s.classList.remove("selected"))

seat.classList.add("selected")
selectedSeat=i

}

document.getElementById("seats").appendChild(seat)

}

function pay(){

if(!selectedSeat){
alert("Please select seat")
return
}

localStorage.setItem("seat",selectedSeat)

window.location.href="https://rzp.io/rzp/Q3W64IW9"

}

</script>

</body>
</html>
