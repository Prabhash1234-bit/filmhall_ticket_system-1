<!DOCTYPE html>
<html>
<head>

<title>FilmHall Ticket</title>

<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

<style>

body{
font-family:Arial;
text-align:center;
}

.ticket{
border:3px dashed black;
width:300px;
margin:auto;
padding:20px;
}

</style>

</head>

<body>

<h1>Your Ticket</h1>

<div class="ticket">

<h2>FILMHALL</h2>

<p>Movie : BARABADHU</p>

<p>Ticket No : <b id="number"></b></p>

<div id="qrcode"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";

import { getFirestore, doc, getDoc, updateDoc, setDoc }
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyCXSoJ951nIgHvyQVwfBALCL4r2qRxoS8g",
authDomain: "filmhall-ticket.firebaseapp.com",
projectId: "filmhall-ticket",
storageBucket: "filmhall-ticket.firebasestorage.app",
messagingSenderId: "856241264632",
appId: "1:856241264632:web:986c80f2f7970d99f8e80d"
};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

const ref = doc(db,"filmhall","counter");

async function generateTicket(){

const snap = await getDoc(ref);

let sold = snap.data().sold;

if(sold >= 10){

document.body.innerHTML="<h1>HOUSEFULL</h1>";

return;

}

sold++;

await updateDoc(ref,{sold:sold});

let ticketId = "FH-" + sold;

document.getElementById("number").innerText = ticketId;

await setDoc(doc(db,"tickets",ticketId),{
used:false
});

let verifyURL = "verify.html?id="+ticketId;

QRCode.toCanvas(document.getElementById("qrcode"),verifyURL);

}

generateTicket();

</script>

</body>
</html>
