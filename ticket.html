<!DOCTYPE html>
<html>
<head>

<title>FilmHall Ticket</title>

<style>

body{
font-family:Arial;
text-align:center;
background:white
}

.ticket{
border:2px dashed black;
padding:20px;
width:300px;
margin:auto;
margin-top:50px
}

button{
padding:12px 20px;
font-size:18px;
margin-top:20px
}

</style>

</head>

<body>

<div class="ticket">

<h2>FILMHALL</h2>

<p>Movie : BARABADHU</p>

<p>Ticket No : <b id="number"></b></p>

<p>Price : ₹1</p>

</div>

<button onclick="window.print()">Download Ticket</button>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyA6gQVhIAYe_aQ6dbsC8yPmIbry39qr5_A",
authDomain: "ticket-filmhall.firebaseapp.com",
projectId: "ticket-filmhall",
storageBucket: "ticket-filmhall.firebasestorage.app",
messagingSenderId: "661202319125",
appId: "1:661202319125:web:5f6ea7fa6ce02188cf5b1c"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const ref = doc(db,"filmhall","counter");

async function generateTicket(){

const snap = await getDoc(ref);

let sold = snap.data().sold;

if(sold >= 100){

document.body.innerHTML="<h1>HOUSEFULL</h1>";

return;

}

sold++;

await updateDoc(ref,{sold:sold});

document.getElementById("number").innerText=sold;

}

generateTicket();

</script>

</body>
</html>
