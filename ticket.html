<!DOCTYPE html>
<html>
<head>

<title>Your Ticket</title>

<style>

body{
text-align:center;
font-family:Arial;
background:#111;
color:white
}

.ticket{

border:2px dashed white;
padding:20px;
width:300px;
margin:auto;
margin-top:50px

}

button{

padding:10px 20px;
margin-top:20px;
font-size:16px

}

</style>

</head>

<body>

<div class="ticket">

<h2>FILMHALL</h2>

<p>Movie : ANANTA</p>

<p>Ticket Number :</p>

<h1 id="ticketNo"></h1>

<p>Price : ₹100</p>

<p>Entry Pass</p>

</div>

<button onclick="window.print()">
Download / Print Ticket
</button>

<script>

const urlParams = new URLSearchParams(window.location.search);

const ticket = urlParams.get('ticket');

document.getElementById("ticketNo").innerText = ticket;

</script>

</body>
</html>
